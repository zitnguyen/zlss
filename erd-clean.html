<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Database Schema - ERD & Relations</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0f0f23;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: rgba(20, 20, 50, 0.95);
        border-bottom: 2px solid #4a5ff0;
        padding: 15px 25px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        z-index: 10;
      }

      .header h1 {
        font-size: 24px;
        color: #4a5ff0;
        font-weight: 700;
      }

      .tabs {
        display: flex;
        gap: 10px;
      }

      .tab-btn {
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #4a5ff0;
        color: #e0e0e0;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 12px;
        font-weight: 600;
      }

      .tab-btn:hover {
        background: rgba(74, 95, 240, 0.2);
      }

      .tab-btn.active {
        background: #4a5ff0;
        border-color: #4a5ff0;
        color: #fff;
      }

      .content {
        flex: 1;
        overflow: hidden;
        display: flex;
      }

      .tab-content {
        flex: 1;
        display: none;
        overflow: auto;
        padding: 20px;
      }

      .tab-content.active {
        display: flex;
        flex-direction: column;
      }

      /* Tables Grid View */
      .tables-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(300px, 1fr));
        gap: 20px;
        padding: 20px;
        overflow-y: auto;
      }

      .table-card {
        background: rgba(30, 30, 60, 0.9);
        border: 2px solid #4a5ff0;
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 4px 15px rgba(74, 95, 240, 0.2);
        transition: all 0.3s ease;
        min-height: 400px;
        display: flex;
        flex-direction: column;
      }

      .table-card:hover {
        box-shadow: 0 6px 25px rgba(74, 95, 240, 0.4);
        transform: translateY(-2px);
      }

      .table-card.auth {
        border-left: 5px solid #34d399;
      }
      .table-card.course {
        border-left: 5px solid #3b82f6;
      }
      .table-card.enrollment {
        border-left: 5px solid #8b5cf6;
      }
      .table-card.schedule {
        border-left: 5px solid #f59e0b;
      }
      .table-card.student {
        border-left: 5px solid #ef4444;
      }
      .table-card.finance {
        border-left: 5px solid #ec4899;
      }
      .table-card.cms {
        border-left: 5px solid #14b8a6;
      }

      .table-name {
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .fields {
        font-size: 12px;
        line-height: 1.8;
        flex: 1;
        overflow-y: auto;
      }

      .field {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
        padding: 3px 5px;
        border-radius: 3px;
      }

      .field:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .field-badge {
        min-width: 28px;
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: 600;
        font-size: 10px;
        text-align: center;
        flex-shrink: 0;
      }

      .badge-pk {
        background: #fbbf24;
        color: #1f2937;
      }

      .badge-fk {
        background: #60a5fa;
        color: #fff;
      }

      .badge-empty {
        visibility: hidden;
      }

      .field-name {
        color: #e0e0e0;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .field-type {
        color: #888;
        font-size: 10px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* Relations View */
      .relations-container {
        width: 100%;
        overflow: auto;
      }

      .relations-table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(30, 30, 60, 0.5);
        margin: 20px 0;
      }

      .relations-table thead {
        background: rgba(74, 95, 240, 0.2);
        border-bottom: 2px solid #4a5ff0;
      }

      .relations-table th {
        padding: 12px;
        text-align: left;
        font-weight: 600;
        color: #4a5ff0;
        border: 1px solid #4a5ff0;
      }

      .relations-table td {
        padding: 10px 12px;
        border: 1px solid rgba(74, 95, 240, 0.3);
        color: #e0e0e0;
      }

      .relations-table tr:nth-child(even) {
        background: rgba(74, 95, 240, 0.05);
      }

      .relations-table tr:hover {
        background: rgba(74, 95, 240, 0.15);
      }

      .badge-relation {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: 600;
        white-space: nowrap;
      }

      .badge-rel-auth {
        background: rgba(52, 211, 153, 0.2);
        color: #34d399;
      }
      .badge-rel-course {
        background: rgba(59, 130, 246, 0.2);
        color: #3b82f6;
      }
      .badge-rel-enrollment {
        background: rgba(139, 92, 246, 0.2);
        color: #8b5cf6;
      }
      .badge-rel-schedule {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
      }
      .badge-rel-student {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }
      .badge-rel-finance {
        background: rgba(236, 72, 153, 0.2);
        color: #ec4899;
      }
      .badge-rel-cms {
        background: rgba(20, 184, 166, 0.2);
        color: #14b8a6;
      }

      /* Legend */
      .legend {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        font-size: 11px;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.02);
        border-top: 1px solid rgba(74, 95, 240, 0.3);
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 2px;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #4a5ff0;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #6b7dff;
      }
    </style>

      // Render tables
      function renderTables() {
        const grid = document.getElementById("tables-grid");
        grid.innerHTML = "";

        tables.forEach((table) => {
          const card = document.createElement("div");
          card.className = `table-card ${table.category}`;

          let html = `<div class="table-name">${table.name}</div>`;
          html += '<div class="fields">';

          table.fields.forEach((field) => {
            let badge = '<span class="field-badge badge-empty">--</span>';
            if (field.badge === "PK") {
              badge = '<span class="field-badge badge-pk">PK</span>';
            } else if (field.badge === "FK") {
              badge = '<span class="field-badge badge-fk">FK</span>';
            }

            html += `
            <div class="field">
              ${badge}
              <span class="field-name">${field.name}</span>
              <span class="field-type">${field.type}</span>
            </div>
          `;
          });

          html += "</div>";
          card.innerHTML = html;
          grid.appendChild(card);
        });
      }

      // Render relations
      function renderRelations() {
        const tbody = document.getElementById("relations-tbody");
        tbody.innerHTML = "";

        relations.forEach((rel) => {
          const row = document.createElement("tr");
          const categoryBadge = `badge-rel-${rel.category}`;

          row.innerHTML = `
          <td><strong>${rel.from}</strong></td>
          <td><code>${rel.field}</code></td>
          <td><strong>${rel.to}</strong></td>
          <td><code>${rel.type}</code></td>
          <td><span class="badge-relation ${categoryBadge}">${rel.category.toUpperCase()}</span></td>
        `;
          tbody.appendChild(row);
        });
      }

      function switchTab(tabName) {
        // Hide all tabs
        document.querySelectorAll(".tab-content").forEach((tab) => {
          tab.classList.remove("active");
        });

        // Remove active from all buttons
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.remove("active");
        });

        // Show selected tab
        document.getElementById(tabName).classList.add("active");

        // Activate button
        event.target.classList.add("active");
      }

      // Initial render
      renderTables();
      renderRelations();
    </script>
  </body>
</html>
